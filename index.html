<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Vault</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="heroSection text-center d-flex flex-column justify-content-center align-items-center">

    <h1 class="mainTitle">
      🎮 Game Vault
    </h1>

    <p class="heroText">
      Legendary story-driven games collection
    </p>

  </header>

  <section class="container mb-5">

    <div class="filterContainer d-flex justify-content-center flex-wrap gap-3">

      <button class="btn filterButton activeButton">
        All
      </button>

      <button class="btn filterButton">
        RPG
      </button>

      <button class="btn filterButton">
        Action
      </button>

      <button class="btn filterButton">
        Adventure
      </button>

    </div>

  </section>

  <main class="container pb-5">

    <div
      class="row g-4 justify-content-center"
      id="cardContainer"
    ></div>

  </main>

  <script src="main.js"></script>

</body>
</html>
