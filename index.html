<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Vault</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="heroSection text-center d-flex flex-column justify-content-center align-items-center">

    <h1 class="mainTitle">
      🎮 Game Vault
    </h1>

    <p class="heroText">
      Legendary story-driven games collection
    </p>

  <button
  class="btn cartButton mt-4"
  data-bs-toggle="modal"
  data-bs-target="#cartModal"
>
  🛒 My Cart
</button>

  </header>

  <section class="container mb-5">

    <div class="filterContainer d-flex justify-content-center flex-wrap gap-3">

      <button class="btn filterButton activeButton" data-genre="All">
  All
</button>

<button class="btn filterButton" data-genre="RPG">
  RPG
</button>

<button class="btn filterButton" data-genre="Adventure">
  Adventure
</button>

<button class="btn filterButton" data-genre="Shooter">
  Shooter
</button>

<button class="btn filterButton" data-genre="Sports">
  Sports
</button>

<button class="btn filterButton" data-genre="Racing">
  Racing
</button>

<button class="btn filterButton" data-genre="Horror">
  Horror
</button>

    </div>

    <div id="cartNotification" class="cartNotification">

  <p>
    🎮 Game added to cart
  </p>

  <button
    class="btn notificationButton"
    data-bs-toggle="modal"
    data-bs-target="#cartModal"
  >
    Go to Cart
  </button>

</div>

  </section>

  <main class="container pb-5">

    <div
      class="row g-4 justify-content-center"
      id="cardContainer"
    ></div>

  </main>

  <div
  class="modal fade"
  id="gameModal"
  tabindex="-1"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content bg-dark text-white">

      <div class="modal-header border-0">

        <h5 class="modal-title" id="modalTitle"></h5>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <img
          id="modalImage"
          class="img-fluid rounded mb-4"
        >

        <p id="modalDescription"></p>

        <div class="d-flex gap-2 flex-wrap">

          <span id="modalGenre" class="badge bg-primary"></span>

          <span id="modalYear" class="badge bg-secondary"></span>

          <span id="modalRating" class="badge bg-success"></span>

        </div>

      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div
  class="modal fade"
  id="cartModal"
  tabindex="-1"
>

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content bg-dark text-white">

      <div class="modal-header border-0">

        <h4 class="modal-title">
          🛒 My Cart
        </h4>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <div id="cartItems"></div>

        <hr>

        <div class="d-flex justify-content-between align-items-center">

          <h5>Total</h5>

          <h4>
            €<span id="totalPrice">0</span>
          </h4>

        </div>

      </div>

    </div>

  </div>

</div>

  <script src="main.js"></script>

</body>
</html>
